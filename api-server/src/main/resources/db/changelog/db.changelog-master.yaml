databaseChangeLog:
  # ========================================
  # MVP Context Changelogs
  # ========================================
  # These changesets are executed when liquibase.contexts=mvp
  # They represent the minimum viable product schema

  # Phase 1: User Authentication & Settings
  - include:
      file: classpath:db/changelog/mvp/v1.0-users-auth.yaml
      context: mvp

  # Phase 2: AI Analysis Data Tables
  - include:
      file: classpath:db/changelog/mvp/v1.1-analysis-tables.yaml
      context: mvp

  # Phase 3: Trading Execution History
  - include:
      file: classpath:db/changelog/mvp/v1.2-trade-history.yaml
      context: mvp

  # Phase 4: KIS API Integration & Schema Updates
  - include:
      file: classpath:db/changelog/mvp/v1.3-schema-updates.yaml
      context: mvp

  # Phase 5: Test Data for MVP Development
  - include:
      file: classpath:db/changelog/mvp/v1.4-test-data.yaml
      context: mvp

  # Phase 6: User Settings Table
  - include:
      file: classpath:db/changelog/mvp/v1.5-user-settings.yaml
      context: mvp

  # Phase 7: Stage 4 & 5 Enhancements (Safety Filter & Trade Execution)
  - include:
      file: classpath:db/changelog/mvp/v1.6-stage4-5-enhancements.yaml
      context: mvp

  # Phase 8: Web Display Tables (Market Summary, Realtime Price, Holdings)
  - include:
      file: classpath:db/changelog/mvp/v1.7-web-display-tables.yaml
      context: mvp

  # Phase 9: Stock Master Catalog & User Favorites
  - include:
      file: classpath:db/changelog/mvp/v1.8-stock-master-favorites.yaml
      context: mvp

  # Phase 10: Overseas (US) Stock Master Support
  - include:
      file: classpath:db/changelog/mvp/v1.9-overseas-stock-master.yaml
      context: mvp

  # Phase 11: Stock News Storage
  - include:
      file: classpath:db/changelog/mvp/v1.10-stock-news.yaml
      context: mvp

  # Phase 12: KIS HTS ID for Realtime Fill Notifications
  - include:
      file: classpath:db/changelog/mvp/v1.11-kis-account-hts-id.yaml
      context: mvp

  # ========================================
  # Product Context Changelogs (Future)
  # ========================================
  # These changesets are executed when liquibase.contexts=product
  # Add full production features here:
  # - Multi-user support
  # - Advanced permissions
  # - Audit logs
  # - Performance optimizations
  # - Additional integrations

  # Example (uncomment when ready):
  # - include:
  #     file: classpath:db/changelog/product/v2.0-multi-user.yaml
  #     context: product
