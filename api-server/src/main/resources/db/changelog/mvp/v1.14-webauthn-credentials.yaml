databaseChangeLog:
  # WebAuthn / Passkey Credentials (생체 로그인 — Face ID/지문/플랫폼 인증기)

  # ========================================
  # webauthn_credentials 테이블 추가
  # - 한 user : N credentials(기기별), 각 credential : 1 user (credential_id UNIQUE)
  # - userHandle 은 별도 저장 없이 userId 8바이트 big-endian 으로 결정적 파생 (users 테이블 미수정)
  # ========================================
  - changeSet:
      id: 1.14.1-create-webauthn-credentials
      author: claude
      context: mvp
      comment: "Create webauthn_credentials table for passkey / biometric login"
      changes:
        - createTable:
            tableName: webauthn_credentials
            remarks: 'WebAuthn(패스키/생체) 자격증명 — 기기별 1 row, userHandle=userId 8B big-endian 파생'
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_webauthn_credentials
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: credential_id
                  type: VARCHAR(512)
                  remarks: 'WebAuthn credential ID (base64url)'
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_webauthn_cred_credential_id
              - column:
                  name: public_key_cose
                  type: TEXT
                  remarks: 'COSE 공개키 (base64url)'
                  constraints:
                    nullable: false
              - column:
                  name: signature_count
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: transports
                  type: VARCHAR(255)
                  remarks: '인증기 transports (csv, nullable)'
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            constraintName: fk_webauthn_cred_user
            baseTableName: webauthn_credentials
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE
        - createIndex:
            indexName: idx_webauthn_cred_user
            tableName: webauthn_credentials
            columns:
              - column:
                  name: user_id
      rollback:
        - dropTable:
            tableName: webauthn_credentials
