databaseChangeLog:
  # Overseas (US) Stock Master Support

  # ========================================
  # stock_master 해외주식 컬럼 추가 (거래소/통화)
  # ========================================
  - changeSet:
      id: 1.9.1-add-overseas-columns
      author: claude
      context: mvp
      comment: "Add exchange_code and currency columns to stock_master for overseas (US) support"
      changes:
        - addColumn:
            tableName: stock_master
            columns:
              - column:
                  name: exchange_code
                  type: VARCHAR(10)
                  constraints:
                    nullable: true
              - column:
                  name: currency
                  type: VARCHAR(3)
                  defaultValue: KRW
                  constraints:
                    nullable: false
        - setColumnRemarks:
            tableName: stock_master
            columnName: exchange_code
            remarks: '해외 거래소 코드 (NASD/NYSE/AMEX, 국내=NULL)'
        - setColumnRemarks:
            tableName: stock_master
            columnName: currency
            remarks: '통화 (KRW/USD)'
      rollback:
        - dropColumn:
            tableName: stock_master
            columnName: exchange_code
        - dropColumn:
            tableName: stock_master
            columnName: currency

  # ========================================
