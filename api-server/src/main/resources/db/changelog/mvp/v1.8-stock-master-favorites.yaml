  # ========================================
  # 사용자 관심 종목 테이블
  # ========================================
  - changeSet:
      id: 1.8.3-create-user-favorites
      author: claude
      context: mvp
      comment: "Create user_favorites table for user watchlist"
      changes:
        - createTable:
            tableName: user_favorites
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user_favorites_user
                    references: users(id)
                    deleteCascade: true
              - column:
                  name: stock_code
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: stock_name
                  type: VARCHAR(50)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: user_favorites
            columnNames: user_id, stock_code
            constraintName: uk_user_favorites_user_stock
        - createIndex:
            indexName: idx_user_favorites_user
            tableName: user_favorites
            columns:
              - column:
                  name: user_id
        - setTableRemarks:
            tableName: user_favorites
            remarks: '사용자별 관심 종목'
        - setColumnRemarks:
            tableName: user_favorites
            columnName: user_id
            remarks: '사용자 ID (FK)'
        - setColumnRemarks:
            tableName: user_favorites
            columnName: stock_code
            remarks: '종목 코드'
        - setColumnRemarks:
            tableName: user_favorites
            columnName: stock_name
            remarks: '종목명 (표시용 비정규화)'
      rollback:
        - dropTable:
            tableName: user_favorites
