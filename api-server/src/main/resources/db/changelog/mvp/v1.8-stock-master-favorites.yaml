databaseChangeLog:
  # Stock Master Catalog & User Favorites

  # ========================================
  # 종목 마스터 카탈로그 테이블 (검색용)
  # ========================================
  - changeSet:
      id: 1.8.1-create-stock-master
      author: claude
      context: mvp
      comment: "Create stock_master table for stock search catalog"
      changes:
        - createTable:
            tableName: stock_master
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: stock_code
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: stock_name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: market
                  type: VARCHAR(20)
                  defaultValue: KOSPI
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_stock_master_code
            tableName: stock_master
            columns:
              - column:
                  name: stock_code
        - createIndex:
            indexName: idx_stock_master_name
            tableName: stock_master
            columns:
              - column:
                  name: stock_name
        - setTableRemarks:
            tableName: stock_master
            remarks: '종목 마스터 카탈로그 (검색용)'
        - setColumnRemarks:
            tableName: stock_master
            columnName: stock_code
            remarks: '종목 코드'
        - setColumnRemarks:
            tableName: stock_master
            columnName: stock_name
            remarks: '종목명'
        - setColumnRemarks:
            tableName: stock_master
            columnName: market
            remarks: '시장 구분 (KOSPI/KOSDAQ 등)'
      rollback:
        - dropTable:
            tableName: stock_master

  # ========================================
