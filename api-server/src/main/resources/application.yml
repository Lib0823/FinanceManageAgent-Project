spring:
  application:
    name: api-server

  # Jackson Configuration (LocalDate/LocalDateTime을 한국시간(KST) 기준으로 직렬화)
  jackson:
    time-zone: Asia/Seoul

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/financemanage
    username: admin
    password: admin1234
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # DB 연결 재시도 설정 (Compound 동시 실행 지원)
      initialization-fail-timeout: 60000  # 60초 동안 재시도
      connection-test-query: SELECT 1
      keepalive-time: 30000  # 30초마다 연결 유지 확인

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        highlight_sql: true
    open-in-view: false

  # Liquibase Configuration
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
    drop-first: false  # NEVER drop in production!
    contexts: mvp      # Start with MVP context

# Server Configuration
server:
  port: 7070
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:financemanage-secret-key-for-jwt-token-generation-minimum-32-characters-production-ready}
  access-token-expiration: 3600000    # 1 hour (ms)
  refresh-token-expiration: 86400000  # 24 hours (ms)

# Internal service-to-service API (ai-agent → api-server, /internal/**).
# X-Internal-Api-Key 헤더로 인증(InternalAuthFilter). 기본값을 두지 않는다(빈 값):
# INTERNAL_API_KEY 미설정 시 내부 채널은 fail-closed 로 전부 차단되어, 약한 기본 시크릿이
# 저장소에 노출되는 것을 방지한다. 운영/도커/로컬 모두 INTERNAL_API_KEY 를 주입해야 한다.
internal:
  api-key: ${INTERNAL_API_KEY:}

# Jasypt Configuration (Updated to secure algorithm)
jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD:default-encryption-key-change-in-production-minimum-32-characters}
    algorithm: PBEWITHHMACSHA512ANDAES_256
    key-obtention-iterations: 1000
    pool-size: 1
    provider-name: SunJCE
    salt-generator-classname: org.jasypt.salt.RandomSaltGenerator
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator
    string-output-type: base64

# KIS API Configuration
kis:
  # Base URL (모의투자 - 매매/잔고 흐름 전용, 변경 금지)
  # - 모의투자: https://openapivts.koreainvestment.com:29443
  # - 실전투자: https://openapi.koreainvestment.com:9443
  base-url: https://openapivts.koreainvestment.com:29443

  # Access Token 캐시 TTL
  # KIS API Access Token은 24시간 유효
  token-cache-ttl: 86400000  # 24 hours (ms)

  # 시세/재무 전용 실전(real) 도메인 + 실전 자격증명.
  # CompanyInfoService(기본정보/재무제표)만 사용한다. 매매 흐름(base-url, DB 모의키)과 분리.
  # KIS 시세/재무 API는 모의(openapivts) 도메인에서 제공되지 않으므로 실전 도메인으로 호출한다.
  # quote-app-key/secret 둘 다 비어있으면 시세/재무 연동 비활성(필드 null + notice).
  quote-base-url: ${KIS_QUOTE_BASE_URL:https://openapi.koreainvestment.com:9443}
  quote-app-key: ${KIS_QUOTE_APP_KEY:}
  quote-app-secret: ${KIS_QUOTE_APP_SECRET:}

  # 실시간 시세 WebSocket 브리지 (Phase 1: 호가 + 체결가).
  # - enabled=false(기본): 상향 연결/엔드포인트 미등록 → 브라우저는 REST 스냅샷 유지(graceful degrade).
  # - ws-url: 실전 ws://ops.koreainvestment.com:21000, 모의 ws://ops.koreainvestment.com:31000.
  # - max-symbols: 상향 연결당 구독 상한(MUST-VERIFY ~41). refcount 로 심볼당 1회 등록.
  # - frame-debug: true 면 TR별 첫 데이터 프레임의 index→value 를 1회 로깅(필드 인덱스 MUST-VERIFY 확정용).
  realtime:
    enabled: ${KIS_REALTIME_ENABLED:false}
    ws-url: ${KIS_REALTIME_WS_URL:ws://ops.koreainvestment.com:21000}
    max-symbols: ${KIS_REALTIME_MAX_SYMBOLS:40}
    frame-debug: ${KIS_REALTIME_FRAME_DEBUG:false}

    # 실시간 체결통보(fill notification) — Phase 2 (KR 전용, 사용자 계좌키 + AES 암호 프레임).
    # - enabled=false(기본): 레지스트리/팩토리 빈 미생성 → 핸들러는 fills 요청에 disabled 안내(graceful degrade). Phase 1 무영향.
    # - ws-url: 모의 ws://ops.koreainvestment.com:31000 (체결통보=모의 trade 도메인 :31000; 시세 real :21000 과 별개, 교차 금지).
    # - tr_key = 사용자 HTS ID(user_kis_accounts.hts_id), tr_id = 모의 H0STCNI9 / 실전 H0STCNI0 (ws-url 도메인으로 선택).
    # - approval/계정키 = 사용자 appkey/secret + kis.base-url(모의). AES key/iv = 구독 ACK output.{key,iv}.
    # - frame-debug: true 면 첫 복호 체결 프레임의 index→value 를 1회 로깅(필드 인덱스/CNTG_YN/SELN_BYOV_CLS MUST-VERIFY 확정용; 계좌/주문정보 포함 → 운영 false).
    # - 리스크 #1(MUST-VERIFY): 모의(H0STCNI9)가 체결통보 스트리밍을 지원하는지 불확실. 미지원이면 실계좌 전용.
    fills:
      enabled: ${KIS_REALTIME_FILLS_ENABLED:false}
      ws-url: ${KIS_REALTIME_FILLS_WS_URL:ws://ops.koreainvestment.com:31000}
      frame-debug: ${KIS_REALTIME_FILLS_FRAME_DEBUG:false}

# DART (금융감독원 전자공시) Open API Configuration
dart:
  # 발급키: https://opendart.fss.or.kr (없으면 DART 연동 비활성, DART 필드는 null)
  api-key: ${DART_API_KEY:}
  base-url: https://opendart.fss.or.kr/api

# WebAuthn / Passkey (생체 로그인) Configuration
# - rp-id : 자격증명이 유효한 도메인. 프론트 origin 의 등록 가능한 부모 도메인이어야 함(로컬=localhost).
# - rp-name : 인증기 UI 에 표시되는 서비스 이름.
# - origins : 프론트 실행 origin 목록(콤마 구분). rp-id 와 정확히 일치해야 NotAllowedError 가 안 남.
# 운영은 HTTPS 도메인으로 교체(WEBAUTHN_RP_ID / WEBAUTHN_ORIGINS).
webauthn:
  rp-id: ${WEBAUTHN_RP_ID:localhost}
  rp-name: ${WEBAUTHN_RP_NAME:FinanceManage}
  origins: ${WEBAUTHN_ORIGINS:http://localhost:5173}

# CORS Configuration
cors:
  allowed-origins:
    - http://localhost:5173  # Vue3 dev server (default)
    - http://localhost:5174  # Vue3 dev server (alternative port)
    - http://localhost:3000  # Nginx production
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allowed-headers:
    - "*"
  allow-credentials: true
  max-age: 3600

# Logging Configuration
logging:
  level:
    root: INFO
    com.inbeom.apiserver: INFO
    # org.springframework.web 는 INFO 유지: DEBUG 면 RestTemplate 요청 본문(KIS appkey/appsecret)이
    # 평문으로 로그에 남는 보안 문제가 있다. 디버깅 시에만 일시적으로 올릴 것.
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator Configuration (Health Check)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
