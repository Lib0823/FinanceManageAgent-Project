server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip 압축 설정
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 정적 파일 캐싱
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # PWA manifest 및 service worker
    location ~* (manifest\.webmanifest|sw\.js|workbox-.*\.js)$ {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # API 프록시: /api/* → api-server (Spring Boot, context-path /api 보존)
    # 프론트엔드는 VITE_API_BASE_URL=/api 로 빌드되어 /api/auth/login 형태로 호출함
    location /api/ {
        proxy_pass http://api-server:7070/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA 라우팅: 모든 요청을 index.html로 폴백
    location / {
        try_files $uri $uri/ /index.html;
    }
}
